<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Graph Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { display: flex; flex-direction: column; height: 100vh; min-height: 520px; background: #1a1a18; color: #c2c0b6; font-family: var(--font-sans, sans-serif); }
#toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 24px; border-bottom: 0.5px solid #3a3a36; flex-shrink: 0; }
#toolbar h1 { font-size: 13px; font-weight: 500; color: #c2c0b6; flex: 1; }
.tb-btn { background: #2c2c2a; border: 0.5px solid #4a4a46; color: #c2c0b6; font-size: 12px; padding: 5px 14px; border-radius: 6px; cursor: pointer; transition: background .12s, color .12s, border-color .12s; }
.tb-btn:hover { background: #3a3a36; }
.tb-btn.view-active { background: #2e2b42; border-color: #534ab7; color: #a09ae8; }
#todo-toggle-btn { display: flex; align-items: center; gap: 5px; }
#todo-toggle-btn .todo-count { background: #3a3a36; border-radius: 8px; font-size: 10px; padding: 1px 5px; color: #888780; min-width: 16px; text-align: center; }
#todo-toggle-btn.has-pending .todo-count { background: #534ab7; color: #c5c0f0; }
#canvas-wrap { flex: 1; overflow: auto; position: relative; cursor: default; user-select: none; }
#canvas-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
#canvas-wrap::-webkit-scrollbar-track { background: transparent; }
#canvas-wrap::-webkit-scrollbar-thumb { background: #3a3a36; border-radius: 3px; }
#canvas-wrap::-webkit-scrollbar-corner { background: transparent; }
#canvas { position: relative; }
svg#arrows { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
.node-el {
  position: absolute; width: 200px; background: #252523; border-radius: 10px;
  padding: 14px 14px 14px 18px; cursor: grab;
  transition: border-color .15s, opacity .2s, box-shadow .2s; user-select: none;
}
.node-el.dragging { cursor: grabbing; }
.node-el.done { opacity: 0.32; filter: grayscale(0.6); }
.node-title { font-size: 13px; font-weight: 500; color: #e0ddd4; word-break: break-word; margin-bottom: 3px; }
.node-subtitle { font-size: 11px; color: #888780; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-note { font-size: 11px; color: #5f5e5a; margin-top: 5px; white-space: pre-wrap; word-break: break-word; min-height: 12px; }
.node-title-input { font-size: 13px; font-weight: 500; color: #e0ddd4; background: transparent; border: none; outline: none; width: 100%; font-family: inherit; cursor: text; }
.node-subtitle-input { font-size: 11px; color: #888780; background: transparent; border: none; outline: none; width: 100%; font-family: inherit; cursor: text; }
.node-note-input { font-size: 11px; color: #5f5e5a; background: transparent; border: none; outline: none; width: 100%; font-family: inherit; resize: none; min-height: 32px; cursor: text; }
.node-controls { position: absolute; top: 7px; right: 7px; display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
.node-el:hover .node-controls, .node-el.done .node-controls { opacity: 1; }
.ctrl-btn { width: 17px; height: 17px; border-radius: 4px; border: 0.5px solid #4a4a46; background: #2c2c2a; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #888780; }
.ctrl-btn:hover { background: #3a3a36; color: #c2c0b6; }
.ctrl-btn.done-btn.active { background: #2a2a28; color: #888780; }
.ctrl-btn.del-btn:hover { background: #501313; border-color: #791f1f; color: #f09595; }
.ctrl-btn.priority-btn.active { color: #e8c547; background: #28240e; border-color: #6b5a1c; }
@keyframes pglow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 0 14px 4px var(--glow-color), 0 4px 24px var(--glow-color); }
  50%       { box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 0 32px 10px var(--glow-color), 0 8px 48px var(--glow-color); }
}
.node-el.priority { animation: pglow 2.2s ease-in-out infinite; }
@keyframes rglow {
  0%, 100% { box-shadow: 0 0 0 2px rgba(255,255,255,0.07), 0 0 22px 7px var(--glow-color), 0 6px 40px var(--glow-color); }
  50%       { box-shadow: 0 0 0 2px rgba(255,255,255,0.07), 0 0 52px 18px var(--glow-color), 0 12px 72px var(--glow-color); }
}
.node-el.root { background: #332f28; border-radius: 12px; border-top: 3px solid var(--bar-color, #7f77dd) !important; }
.node-el.root:not(.done):not(.priority) { animation: rglow 2.8s ease-in-out infinite; }
.node-el.root .node-title { font-size: 18px; font-weight: 700; color: #f5f2e8; letter-spacing: 0.02em; }
.node-el.root .node-subtitle { font-size: 12px; color: #a09d94; }
.add-child-btn {
  position: absolute; width: 18px; height: 18px; border-radius: 50%;
  background: #2c2c2a; border: 0.5px solid #4a4a46; color: #888780;
  font-size: 13px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; z-index: 10; line-height: 1; opacity: 0; transition: opacity .15s;
}
#empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #5f5e5a; font-size: 13px; gap: 10px; }

/* Drop indicator for sibling reorder */
.drop-indicator {
  position: absolute; height: 2px; background: #7f77dd; border-radius: 1px;
  pointer-events: none; z-index: 50;
  box-shadow: 0 0 6px rgba(127,119,221,0.5);
}
.drop-indicator::before {
  content: ''; position: absolute; left: -4px; top: -3px;
  width: 8px; height: 8px; border-radius: 50%; background: #7f77dd;
}

/* ── Minimap ── */
#minimap {
  position: fixed; bottom: 16px; right: 16px;
  width: 160px; height: 110px;
  background: #1a1a18;
  border: 0.5px solid #3a3a36;
  border-radius: 6px;
  overflow: hidden;
  z-index: 60;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  cursor: crosshair;
}
#minimap canvas { position: absolute; top: 0; left: 0; }
#minimap-viewport {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  pointer-events: none;
}

/* ── Todo Panel ── */
#todo-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 260px;
  background: #1e1e1c;
  border-left: 0.5px solid #3a3a36;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  z-index: 100;
  box-shadow: -12px 0 40px rgba(0,0,0,0.45);
}
#todo-panel.open { transform: translateX(0); }
#todo-panel-header {
  display: flex; align-items: center;
  padding: 14px 16px 12px;
  border-bottom: 0.5px solid #2e2e2c;
  flex-shrink: 0;
}
#todo-panel-header h2 { font-size: 12px; font-weight: 500; color: #c2c0b6; flex: 1; letter-spacing: 0.03em; }
#todo-close-btn { width: 20px; height: 20px; border-radius: 4px; border: 0.5px solid #3a3a36; background: transparent; color: #5f5e5a; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
#todo-close-btn:hover { background: #2c2c2a; color: #c2c0b6; }
#todo-add-row {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px;
  border-bottom: 0.5px solid #2a2a28;
  flex-shrink: 0;
}
#todo-input {
  flex: 1; background: #252523; border: 0.5px solid #3a3a36; border-radius: 6px;
  color: #c2c0b6; font-size: 12px; font-family: inherit;
  padding: 5px 9px; outline: none;
}
#todo-input::placeholder { color: #4a4a46; }
#todo-input:focus { border-color: #4a4a46; }
#todo-add-ok { width: 24px; height: 24px; border-radius: 5px; border: 0.5px solid #3a3a36; background: #252523; color: #888780; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#todo-add-ok:hover { background: #3a3a36; color: #c2c0b6; }
#todo-list { flex: 1; overflow-y: auto; padding: 6px 0; }
#todo-list::-webkit-scrollbar { width: 3px; }
#todo-list::-webkit-scrollbar-track { background: transparent; }
#todo-list::-webkit-scrollbar-thumb { background: #3a3a36; border-radius: 2px; }
.todo-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 14px;
  transition: background .1s;
}
.todo-item:hover { background: #252523; }
.todo-check {
  width: 14px; height: 14px; border-radius: 3px;
  border: 0.5px solid #4a4a46; background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: transparent; transition: all .1s;
}
.todo-check:hover { border-color: #888780; }
.todo-item.checked .todo-check { background: #2c2c2a; border-color: #3a3a36; color: #5f5e5a; }
.todo-label {
  flex: 1; font-size: 12px; color: #c2c0b6; line-height: 1.45;
  word-break: break-word; cursor: text; outline: none; min-height: 16px;
}
.todo-item.checked .todo-label { color: #4a4a46; text-decoration: line-through; text-decoration-color: #3a3a36; }
.todo-del {
  width: 14px; height: 14px; border-radius: 3px; border: none; background: transparent;
  color: transparent; font-size: 10px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
  transition: all .1s;
}
.todo-item:hover .todo-del { color: #5f5e5a; }
.todo-del:hover { color: #f09595 !important; background: #501313; }
#todo-footer {
  padding: 8px 14px 12px;
  border-top: 0.5px solid #2a2a28;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
#todo-footer span { font-size: 10px; color: #4a4a46; }
#todo-clear-done { font-size: 10px; color: #4a4a46; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
#todo-clear-done:hover { color: #888780; }
.todo-empty { padding: 32px 14px; text-align: center; color: #3a3a36; font-size: 12px; }

/* ── Flags ── */
.ctrl-btn.flag-btn.flag-today      { color: #4a9eff; background: #0d1a2a; border-color: #1e4070; }
.ctrl-btn.flag-btn.flag-tomorrow   { color: #f0a030; background: #221908; border-color: #6b480e; }
.ctrl-btn.flag-btn.flag-week       { color: #a78bfa; background: #1a1030; border-color: #4a2a90; }
.ctrl-btn.flag-btn.flag-urgent     { color: #e85050; background: #280e0e; border-color: #7a2020; }
.ctrl-btn.flag-btn.flag-non-urgent { color: #888780; background: #1e1e1c; border-color: #4a4a46; }
.node-flag {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; margin-top: 5px; padding: 1px 6px 2px;
  border-radius: 3px; font-weight: 500; letter-spacing: 0.01em;
}
.node-flag.flag-today      { background: rgba(74,158,255,0.1);   color: #4a9eff;  border: 0.5px solid rgba(74,158,255,0.22); }
.node-flag.flag-tomorrow   { background: rgba(240,160,48,0.1);   color: #f0a030;  border: 0.5px solid rgba(240,160,48,0.22); }
.node-flag.flag-week       { background: rgba(167,139,250,0.1);  color: #a78bfa;  border: 0.5px solid rgba(167,139,250,0.22); }
.node-flag.flag-urgent     { background: rgba(232,80,80,0.1);    color: #e85050;  border: 0.5px solid rgba(232,80,80,0.22); }
.node-flag.flag-non-urgent { background: rgba(136,135,128,0.08); color: #888780;  border: 0.5px solid rgba(136,135,128,0.2); }

/* ── Up-to-date badge ── */
.node-uptodate {
  display: flex; align-items: center; gap: 3px;
  font-size: 10px; color: #5dcaa5; margin-top: 5px; opacity: 0.75;
}

/* ── Health badge ── */
.node-health {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; margin-top: 5px; padding: 2px 7px 2px;
  border-radius: 3px; font-weight: 500; letter-spacing: 0.01em;
}
.node-health.health-active   { background: rgba(93,202,165,0.12);  color: #5dcaa5; border: 0.5px solid rgba(93,202,165,0.25); }
.node-health.health-drifting { background: rgba(240,160,48,0.10);  color: #f0a030; border: 0.5px solid rgba(240,160,48,0.22); }
.node-health.health-stalled  { background: rgba(136,135,128,0.10); color: #888780; border: 0.5px solid rgba(136,135,128,0.22); }
.node-health.health-complete { background: rgba(93,202,165,0.06);  color: #5dcaa5; border: 0.5px solid rgba(93,202,165,0.14); opacity: 0.55; }

/* ── Schedule View ── */
#schedule-view {
  display: none; flex: 1; flex-direction: column;
  background: #1a1a18; overflow: hidden;
}
#schedule-view.visible { display: flex; }
.sv-header {
  display: flex; align-items: baseline; gap: 14px;
  padding: 22px 28px 16px;
  border-bottom: 0.5px solid #2a2a28;
  flex-shrink: 0;
}
.sv-title { font-size: 18px; font-weight: 700; color: #f5f2e8; letter-spacing: 0.02em; }
.sv-meta { font-size: 12px; color: #5f5e5a; }
.sv-columns { display: flex; flex: 1; overflow: hidden; }
.sv-col {
  flex: 1; display: flex; flex-direction: column;
  border-right: 0.5px solid #222220;
  min-width: 0; overflow: hidden;
}
.sv-col:last-child { border-right: none; }
.sv-col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 9px;
  border-bottom-width: 2px; border-bottom-style: solid;
  flex-shrink: 0;
}
.sv-col-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.sv-col-count { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 8px; min-width: 18px; text-align: center; }
.sv-col-body {
  flex: 1; overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 7px;
}
.sv-col-body::-webkit-scrollbar { width: 3px; }
.sv-col-body::-webkit-scrollbar-track { background: transparent; }
.sv-col-body::-webkit-scrollbar-thumb { background: #2e2e2c; border-radius: 2px; }
.sv-empty { color: #333331; font-size: 11px; text-align: center; padding: 28px 8px; font-style: italic; }
.sv-task {
  background: #252523; border: 0.5px solid #333331;
  border-left: 3px solid var(--accent, #888780);
  border-radius: 7px; padding: 9px 11px 8px;
  transition: background .1s;
}
.sv-task:hover { background: #2c2c2a; }
.sv-task-title { font-size: 12px; font-weight: 500; color: #e0ddd4; line-height: 1.4; }
.sv-task-sub { font-size: 10px; color: #5f5e5a; margin-top: 2px; }
.sv-task-footer { display: flex; align-items: center; gap: 5px; margin-top: 7px; }
.sv-proj-name { font-size: 10px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.7; }
.sv-btn {
  width: 18px; height: 18px; border-radius: 4px;
  border: 0.5px solid #3a3a36; background: #2a2a28;
  color: #5f5e5a; font-size: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sv-btn.done-btn:hover { background: #162816; color: #5dcaa5; border-color: #2a4a2a; }
.sv-btn.clear-btn:hover { background: #3a3a36; color: #c2c0b6; }
.sv-task[draggable] { cursor: grab; }
.sv-task.sv-dragging { opacity: 0.35; cursor: grabbing; }
.sv-col-body.sv-drag-over { background: rgba(127,119,221,0.07); outline: 1.5px dashed rgba(127,119,221,0.4); outline-offset: -3px; border-radius: 4px; }

/* ── Primary new-project button ── */
#add-btn { background: #3d3476; border-color: #7f77dd; color: #d0ccff; padding: 7px 20px; font-size: 13px; font-weight: 600; }
#add-btn:hover { background: #534ab7; border-color: #9891f0; }

/* ── Options dropdown ── */
#options-wrap { position: relative; }
#options-dropdown {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #252523; border: 0.5px solid #4a4a46; border-radius: 8px;
  padding: 4px; min-width: 168px; z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.55);
  display: none; animation: fdrop .1s ease;
}
@keyframes fdrop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
#options-dropdown.open { display: block; }
.opt-item {
  display: block; width: 100%; text-align: left;
  background: transparent; border: none; border-radius: 5px;
  color: #c2c0b6; font-size: 12px; font-family: inherit;
  padding: 7px 12px; cursor: pointer; white-space: nowrap;
}
.opt-item:hover { background: #3a3a36; }

/* ── Floating view toggle ── */
#view-toggle {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 2px;
  background: #252523; border: 0.5px solid #4a4a46; border-radius: 20px;
  padding: 3px; z-index: 55;
  box-shadow: 0 4px 20px rgba(0,0,0,0.55);
}
.vt-btn {
  background: transparent; border: none; border-radius: 16px;
  color: #888780; font-size: 11px; padding: 5px 14px; cursor: pointer;
  font-family: inherit; transition: background .12s, color .12s;
  white-space: nowrap;
}
.vt-btn:hover { color: #c2c0b6; background: #333331; }
.vt-btn.vt-active { background: #2e2b42; color: #a09ae8; }

/* ── Navigate-to-node highlight ring ── */
.node-el.nav-highlight::after {
  content: ''; position: absolute; inset: -4px; border-radius: 13px;
  border: 2px solid rgba(127,119,221,0.85); pointer-events: none;
  animation: nhring 1.5s ease-out forwards;
}
@keyframes nhring {
  0%   { opacity: 1; inset: -4px; }
  100% { opacity: 0; inset: -10px; }
}

/* ── Schedule task clickable ── */
.sv-task { cursor: pointer; }
.sv-task-nav { font-size: 9px; color: #444441; margin-left: auto; padding-right: 2px; transition: color .1s; }
.sv-task:hover .sv-task-nav { color: #888780; }

/* ── Momentum View ── */
#momentum-view {
  display: none; flex: 1; flex-direction: column;
  background: #1a1a18; overflow: hidden;
}
#momentum-view.visible { display: flex; }
.mv-header {
  display: flex; align-items: baseline; gap: 14px;
  padding: 22px 28px 16px;
  border-bottom: 0.5px solid #2a2a28;
  flex-shrink: 0;
}
.mv-title { font-size: 18px; font-weight: 700; color: #f5f2e8; letter-spacing: 0.02em; }
.mv-meta { font-size: 12px; color: #5f5e5a; }
.mv-body { display: flex; flex: 1; overflow: hidden; }
.mv-sidebar {
  width: 256px; flex-shrink: 0;
  border-right: 0.5px solid #2a2a28;
  padding: 22px 20px;
  display: flex; flex-direction: column; gap: 0;
  overflow-y: auto;
}
.mv-spark-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #4a4a46; margin-bottom: 12px; }
.mv-spark-svg { width: 100%; height: 88px; display: block; }
.mv-spark-days { display: flex; justify-content: space-between; margin-top: 5px; margin-bottom: 20px; }
.mv-spark-days span { font-size: 9px; color: #3a3a36; }
.mv-spark-days span.is-today { color: #5f5e5a; }
.mv-stats { display: flex; flex-direction: column; gap: 8px; padding-top: 16px; border-top: 0.5px solid #2a2a28; }
.mv-stat { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #5f5e5a; }
.mv-stat-val { color: #c2c0b6; font-weight: 500; }
.mv-list-area {
  flex: 1; overflow-y: auto; padding: 20px 26px;
  display: flex; flex-direction: column; gap: 22px;
}
.mv-list-area::-webkit-scrollbar { width: 4px; }
.mv-list-area::-webkit-scrollbar-track { background: transparent; }
.mv-list-area::-webkit-scrollbar-thumb { background: #3a3a36; border-radius: 2px; }
.mv-proj-group { display: flex; flex-direction: column; gap: 5px; }
.mv-proj-heading {
  display: flex; align-items: center; gap: 8px;
  padding: 0 0 8px 12px;
  border-left-width: 3px; border-left-style: solid;
  border-bottom: 0.5px solid #2a2a28;
  margin-bottom: 2px;
}
.mv-proj-heading-name { font-size: 11px; font-weight: 600; }
.mv-proj-heading-count { margin-left: auto; font-size: 10px; font-weight: 400; color: #4a4a46; }
.mv-task {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 6px;
  background: #252523; border: 0.5px solid #2e2e2c;
  transition: background .1s;
}
.mv-task:hover { background: #2c2c2a; }
.mv-check-ring {
  width: 15px; height: 15px; border-radius: 50%;
  border: 1.5px solid; font-size: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.mv-task-info { flex: 1; min-width: 0; }
.mv-task-name { font-size: 12px; color: #c2c0b6; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mv-task-sub { font-size: 10px; color: #5f5e5a; margin-top: 1px; }

/* ── Momentum skeleton empty state ── */

/* ── Guide Modal ── */

</style>

<script>
const STORAGE_KEY = 'pgraph_v4';
const NODE_W = 200, NODE_H_BASE = 78, COL_GAP = 80, ROW_GAP = 24, PROJ_GAP = 60;
const OFFSET_X = 60, OFFSET_Y = 60;
const MINI_W = 160, MINI_H = 110;

const PALETTE = [
  { border: '#534ab7', glow: 'rgba(83,74,183,0.28)',  arrow: '#534ab7', bar: '#7f77dd' },
  { border: '#0f6e56', glow: 'rgba(15,110,86,0.28)',   arrow: '#1d9e75', bar: '#5dcaa5' },
  { border: '#993c1d', glow: 'rgba(153,60,29,0.28)',   arrow: '#d85a30', bar: '#f0997b' },
  { border: '#993556', glow: 'rgba(153,53,86,0.28)',   arrow: '#d4537e', bar: '#ed93b1' },
  { border: '#185fa5', glow: 'rgba(24,95,165,0.28)',   arrow: '#378add', bar: '#85b7eb' },
  { border: '#854f0b', glow: 'rgba(133,79,11,0.28)',   arrow: '#ba7517', bar: '#ef9f27' },
  { border: '#3b6d11', glow: 'rgba(59,109,17,0.28)',   arrow: '#639922', bar: '#97c459' },
  { border: '#5f5e5a', glow: 'rgba(95,94,90,0.22)',    arrow: '#888780', bar: '#b4b2a9' },
];

const FLAG_LABELS = { today: '● Today', tomorrow: '● Tomorrow', week: '● This week', urgent: '● Urgent', 'non-urgent': '● Non-urgent' };
const FLAG_CYCLE  = { today: 'tomorrow', tomorrow: 'week', week: 'urgent', urgent: 'non-urgent', 'non-urgent': null };

let state = { projects: [], todos: [] };
let idC = 1;
let activeEdit = null;
let lastPositions = {};
let currentView = 'graph'; // 'graph' | 'schedule' | 'momentum'

const canvasWrap = document.getElementById('canvas-wrap');

// ── View switching ────────────────────────────────────────────────────────────
function updateViewToggle() {
  document.querySelectorAll('.vt-btn').forEach(btn => {
    btn.classList.toggle('vt-active', btn.dataset.view === currentView);
  });
}

function showView(view) {
  if (currentView === view) view = 'graph';
  currentView = view;

  canvasWrap.style.display = view === 'graph' ? '' : 'none';
  document.getElementById('schedule-view').classList.toggle('visible', view === 'schedule');
  document.getElementById('momentum-view').classList.toggle('visible', view === 'momentum');
  document.getElementById('minimap').style.display = view === 'graph' ? '' : 'none';

  updateViewToggle();

  if (view === 'schedule') renderScheduleView();
  if (view === 'momentum') renderMomentumView();
}

function navigateToNode(nodeId) {
  currentView = 'graph';
  canvasWrap.style.display = '';
  document.getElementById('schedule-view').classList.remove('visible');
  document.getElementById('momentum-view').classList.remove('visible');
  document.getElementById('minimap').style.display = '';
  updateViewToggle();

  const pos = lastPositions[nodeId];
  if (pos) {
    const cx = pos.x + pos.w / 2 - canvasWrap.clientWidth / 2;
    const cy = pos.y + pos.h / 2 - canvasWrap.clientHeight / 2;
    canvasWrap.scrollTo({ left: Math.max(0, cx), top: Math.max(0, cy), behavior: 'smooth' });
    setTimeout(() => {
      const el = document.getElementById('node-' + nodeId);
      if (el) {
        el.classList.add('nav-highlight');
        setTimeout(() => el.classList.remove('nav-highlight'), 1600);
      }
    }, 300);
  }
}

// ── Minimap ───────────────────────────────────────────────────────────────────
function renderMinimap() {
  if (currentView !== 'graph') return;
  const mc = document.getElementById('minimap-canvas');
  const mv = document.getElementById('minimap-viewport');
  const canvasEl = document.getElementById('canvas');
  const cW = Math.max(400, parseFloat(canvasEl.style.width)  || canvasWrap.clientWidth);
  const cH = Math.max(300, parseFloat(canvasEl.style.height) || canvasWrap.clientHeight);
  const s  = Math.min(MINI_W / cW, MINI_H / cH);

  const ctx = mc.getContext('2d');
  ctx.clearRect(0, 0, MINI_W, MINI_H);
  ctx.fillStyle = '#252523';
  for (const pos of Object.values(lastPositions)) {
    ctx.fillRect(pos.x * s, pos.y * s, pos.w * s, Math.max(2, pos.h * s));
  }

  const sL = canvasWrap.scrollLeft;
  const sT = canvasWrap.scrollTop;
  mv.style.left   = (sL * s) + 'px';
  mv.style.top    = (sT * s) + 'px';
  mv.style.width  = Math.min(MINI_W, canvasWrap.clientWidth  * s) + 'px';
  mv.style.height = Math.min(MINI_H, canvasWrap.clientHeight * s) + 'px';
}
canvasWrap.addEventListener('scroll', renderMinimap);

document.getElementById('minimap').addEventListener('mousedown', e => {
  const rect = document.getElementById('minimap').getBoundingClientRect();
  const canvasEl = document.getElementById('canvas');
  const cW = Math.max(400, parseFloat(canvasEl.style.width)  || canvasWrap.clientWidth);
  const cH = Math.max(300, parseFloat(canvasEl.style.height) || canvasWrap.clientHeight);
  const s  = Math.min(MINI_W / cW, MINI_H / cH);
  canvasWrap.scrollLeft = (e.clientX - rect.left)  / s - canvasWrap.clientWidth  / 2;
  canvasWrap.scrollTop  = (e.clientY - rect.top)   / s - canvasWrap.clientHeight / 2;
});

// ── screenToCanvas ────────────────────────────────────────────────────────────
function screenToCanvas(cx, cy) {
  const r = canvasWrap.getBoundingClientRect();
  return {
    x: cx - r.left + canvasWrap.scrollLeft,
    y: cy - r.top  + canvasWrap.scrollTop,
  };
}

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (activeEdit) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (currentView !== 'graph') return;
  const STEP = 80;
  switch (e.key) {
    case 'ArrowUp':    canvasWrap.scrollBy(0, -STEP); e.preventDefault(); break;
    case 'ArrowDown':  canvasWrap.scrollBy(0,  STEP); e.preventDefault(); break;
    case 'ArrowLeft':  canvasWrap.scrollBy(-STEP, 0); e.preventDefault(); break;
    case 'ArrowRight': canvasWrap.scrollBy( STEP, 0); e.preventDefault(); break;
  }
});

// ── Sibling Reorder Drag ──────────────────────────────────────────────────────
let dragSt = null;

function findParentInfo(nodeId) {
  const ri = state.projects.findIndex(p => p.id === nodeId);
  if (ri >= 0) return { arr: state.projects, index: ri };
  function search(node) {
    for (let i = 0; i < (node.children || []).length; i++) {
      if (node.children[i].id === nodeId) return { arr: node.children, index: i };
      const r = search(node.children[i]);
      if (r) return r;
    }
    return null;
  }
  for (const p of state.projects) {
    const r = search(p);
    if (r) return r;
  }
  return null;
}

function computeDropIndex(arr, canvasY) {
  for (let i = 0; i < arr.length; i++) {
    const pos = lastPositions[arr[i].id];
    if (!pos) continue;
    if (canvasY < pos.y + pos.h / 2) return i;
  }
  return arr.length;
}

function indicatorLineY(arr, insertIdx) {
  const prev = arr[insertIdx - 1] ? lastPositions[arr[insertIdx - 1].id] : null;
  const next = arr[insertIdx]     ? lastPositions[arr[insertIdx].id]     : null;
  return (prev && next) ? (prev.y + prev.h + next.y) / 2 : null;
}

// ── Unified mousemove / mouseup ───────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  if (!dragSt) return;
  const dx = e.clientX - dragSt.startX, dy = e.clientY - dragSt.startY;
  if (!dragSt.active && Math.sqrt(dx * dx + dy * dy) < 6) return;

  if (!dragSt.active) {
    dragSt.active = true;
    const srcEl = document.getElementById('node-' + dragSt.nodeId);
    if (srcEl) { dragSt.srcEl = srcEl; srcEl.style.opacity = '0.22'; srcEl.classList.add('dragging'); }

    dragSt.ghost = srcEl ? srcEl.cloneNode(true) : document.createElement('div');
    dragSt.ghost.removeAttribute('id');
    Object.assign(dragSt.ghost.style, {
      position: 'fixed', pointerEvents: 'none', zIndex: '9999', opacity: '0.85',
    });
    document.body.appendChild(dragSt.ghost);

    dragSt.indicator = document.createElement('div');
    dragSt.indicator.className = 'drop-indicator';
    dragSt.indicator.style.display = 'none';
    document.getElementById('nodes-layer').appendChild(dragSt.indicator);

    document.body.style.cursor = 'grabbing';
  }

  dragSt.ghost.style.left = (e.clientX - NODE_W / 2) + 'px';
  dragSt.ghost.style.top  = (e.clientY - 20) + 'px';

  const cp = screenToCanvas(e.clientX, e.clientY);
  const info = findParentInfo(dragSt.nodeId);
  if (info && info.arr.length > 1) {
    const insertIdx = computeDropIndex(info.arr, cp.y);
    dragSt.dropIndex = insertIdx;
    const iy = indicatorLineY(info.arr, insertIdx);
    const sibPos = info.arr[0] ? lastPositions[info.arr[0].id] : null;
    if (iy != null && sibPos) {
      dragSt.indicator.style.display = 'block';
      dragSt.indicator.style.left  = sibPos.x + 'px';
      dragSt.indicator.style.top   = iy + 'px';
      dragSt.indicator.style.width = NODE_W + 'px';
    } else {
      dragSt.indicator.style.display = 'none';
    }
  }
});

document.addEventListener('mouseup', e => {
  if (dragSt) {
    document.body.style.cursor = '';
    if (dragSt.active) {
      if (dragSt.srcEl) { dragSt.srcEl.style.opacity = ''; dragSt.srcEl.classList.remove('dragging'); }
      if (dragSt.ghost) dragSt.ghost.remove();
      if (dragSt.indicator) dragSt.indicator.remove();

      const info = findParentInfo(dragSt.nodeId);
      if (info && dragSt.dropIndex != null) {
        const oldIdx = info.index;
        const insertAt = dragSt.dropIndex > oldIdx ? dragSt.dropIndex - 1 : dragSt.dropIndex;
        if (insertAt !== oldIdx) {
          const [node] = info.arr.splice(oldIdx, 1);
          info.arr.splice(insertAt, 0, node);
          saveState();
          render();
        }
      }
    }
    dragSt = null;
  }
});

// ── State ─────────────────────────────────────────────────────────────────────
function genId()  { return 'n' + (idC++); }
function todoId() { return 't' + Date.now() + Math.random().toString(36).slice(2, 6); }

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const loaded = JSON.parse(s);
      state = loaded;
      if (!Array.isArray(state.todos)) state.todos = [];
      let mx = 0;
      function walk(n) {
        mx = Math.max(mx, parseInt(n.id.slice(1)) || 0);
        if (!('completedAt' in n)) n.completedAt = null;
        if (!('createdAt' in n)) n.createdAt = null;
        (n.children || []).forEach(walk);
      }
      state.projects.forEach(walk);
      idC = mx + 1;
    }
  } catch(e) {}
}

function newNode(title = 'New project') {
  return { id: genId(), title, subtitle: '', note: '', done: false, priority: false, flag: null, completedAt: null, createdAt: Date.now(), children: [] };
}

function allDescendantsDone(node) {
  if (!node.children || !node.children.length) return true;
  return node.children.every(c => c.done && allDescendantsDone(c));
}

function getProjectMomentum(proj) {
  const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
  let count = 0;
  function countDone(node) {
    if (node.done && node.completedAt != null && node.completedAt > cutoff) count++;
    (node.children || []).forEach(countDone);
  }
  countDone(proj);
  return count;
}

function getProjectHealth(proj) {
  let total = 0, done = 0, hasOpenFlagOrPriority = false;
  function scan(node) {
    total++;
    if (node.done) { done++; } else { if (node.flag || node.priority) hasOpenFlagOrPriority = true; }
    (node.children || []).forEach(scan);
  }
  scan(proj);
  if (total > 0 && done === total) return 'complete';
  if (getProjectMomentum(proj) > 0 || hasOpenFlagOrPriority) return 'active';
  if (done > 0) return 'drifting';
  return 'stalled';
}

function nodeHeight(node, isRoot) {
  let h = NODE_H_BASE;
  const titleLines = Math.max(1, Math.ceil((node.title || '').length / 22));
  if (titleLines > 1) h += (titleLines - 1) * 18;
  if (node.note && node.note.trim()) h += Math.max(1, Math.ceil(node.note.length / 22)) * 14;
  if (node.flag && !node.done) h += 20;
  if (!node.done && node.children && node.children.length > 0 && allDescendantsDone(node)) h += 18;
  if (isRoot) h += 18;
  return h;
}

function subtreeHeight(node) {
  const h = nodeHeight(node);
  if (!node.children || !node.children.length) return h;
  const ch = node.children.reduce((s, c) => s + subtreeHeight(c) + ROW_GAP, -ROW_GAP);
  return Math.max(h, ch);
}

function layoutProject(proj, startY) {
  const positions = {};
  function place(node, col, top) {
    const h = nodeHeight(node, node === proj);
    const sh = subtreeHeight(node);
    const myY = top + (sh - h) / 2;
    positions[node.id] = { x: OFFSET_X + col * (NODE_W + COL_GAP), y: OFFSET_Y + startY + myY, w: NODE_W, h };
    if (node.children && node.children.length) {
      let childTop = top;
      node.children.forEach(child => {
        place(child, col + 1, childTop);
        childTop += subtreeHeight(child) + ROW_GAP;
      });
    }
  }
  place(proj, 0, 0);
  const totalHeight = subtreeHeight(proj);
  return { positions, totalHeight };
}

function removeNode(proj, id) {
  function rm(arr) {
    for (let i = 0; i < arr.length; i++) {
      if (arr[i].id === id) { arr.splice(i, 1); return true; }
      if (arr[i].children && rm(arr[i].children)) return true;
    }
  }
  rm([proj]);
}

function findNodeById(id) {
  function search(node) {
    if (node.id === id) return node;
    for (const c of (node.children || [])) {
      const found = search(c);
      if (found) return found;
    }
    return null;
  }
  for (const p of state.projects) {
    const found = search(p);
    if (found) return found;
  }
  return null;
}

function commitEdit() {
  if (!activeEdit) return;
  const { node, t, s, n } = activeEdit;
  node.title = t.value.trim() || node.title;
  node.subtitle = s.value.trim();
  node.note = n.value.trim();
  activeEdit = null;
  saveState();
  render();
}

document.addEventListener('mousedown', e => {
  if (!activeEdit) return;
  if (!activeEdit.el.contains(e.target)) commitEdit();
});

function startEdit(el, node) {
  if (activeEdit && activeEdit.node === node) return;
  if (activeEdit && activeEdit.node !== node) {
    const prev = activeEdit;
    prev.node.title = prev.t.value.trim() || prev.node.title;
    prev.node.subtitle = prev.s.value.trim();
    prev.node.note = prev.n.value.trim();
    activeEdit = null;
    saveState();
  }

  const titleEl = el.querySelector('.node-title');
  const subEl   = el.querySelector('.node-subtitle');
  const noteEl  = el.querySelector('.node-note');

  titleEl.outerHTML = `<input class="node-title-input" value="${escA(node.title)}" placeholder="Title" maxlength="40">`;
  subEl.outerHTML   = `<input class="node-subtitle-input" value="${escA(node.subtitle)}" placeholder="Subtitle..." maxlength="50">`;
  noteEl.outerHTML  = `<textarea class="node-note-input" placeholder="Note..." rows="2">${esc(node.note)}</textarea>`;

  const t = el.querySelector('.node-title-input');
  const s = el.querySelector('.node-subtitle-input');
  const n = el.querySelector('.node-note-input');

  activeEdit = { node, el, t, s, n };
  t.focus(); t.select();

  t.addEventListener('keydown', e => {
    if (e.key === 'Tab') { e.preventDefault(); s.focus(); }
    if (e.key === 'Enter') { e.preventDefault(); s.focus(); }
    if (e.key === 'Escape') commitEdit();
  });
  s.addEventListener('keydown', e => {
    if (e.key === 'Tab') { e.preventDefault(); n.focus(); }
    if (e.key === 'Enter') { e.preventDefault(); n.focus(); }
    if (e.key === 'Escape') commitEdit();
  });
  n.addEventListener('keydown', e => {
    if (e.key === 'Escape') commitEdit();
    if (e.key === 'Tab') { e.preventDefault(); commitEdit(); }
  });
}

// ── Todo Logic ────────────────────────────────────────────────────────────────
function renderTodos() {
  const list = document.getElementById('todo-list');
  const remaining = document.getElementById('todo-remaining');
  const toggleBtn = document.getElementById('todo-toggle-btn');
  const countEl = toggleBtn.querySelector('.todo-count');

  const todos = state.todos;
  const pendingCount = todos.filter(t => !t.done).length;
  countEl.textContent = pendingCount;
  toggleBtn.classList.toggle('has-pending', pendingCount > 0);

  const leftText = pendingCount === 0 && todos.length > 0
    ? 'all done ✓'
    : pendingCount === 1 ? '1 remaining' : pendingCount > 1 ? `${pendingCount} remaining` : '';
  remaining.textContent = leftText;

  if (todos.length === 0) {
    list.innerHTML = '<div class="todo-empty">Nothing here yet</div>';
    return;
  }

  list.innerHTML = '';
  todos.forEach((todo, i) => {
    const item = document.createElement('div');
    item.className = 'todo-item' + (todo.done ? ' checked' : '');

    const check = document.createElement('div');
    check.className = 'todo-check';
    check.title = todo.done ? 'Unmark' : 'Mark done';
    check.textContent = todo.done ? '✓' : '';
    check.onclick = () => { todo.done = !todo.done; saveState(); renderTodos(); };

    const label = document.createElement('div');
    label.className = 'todo-label';
    label.contentEditable = 'true';
    label.spellcheck = false;
    label.textContent = todo.text;
    label.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); label.blur(); }
      if (e.key === 'Escape') { label.textContent = todo.text; label.blur(); }
    });
    label.addEventListener('blur', () => {
      const newText = label.textContent.trim();
      if (newText && newText !== todo.text) { todo.text = newText; saveState(); }
    });

    const del = document.createElement('button');
    del.className = 'todo-del';
    del.title = 'Remove';
    del.textContent = '✕';
    del.onclick = () => { state.todos.splice(i, 1); saveState(); renderTodos(); };

    item.appendChild(check);
    item.appendChild(label);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function addTodo(text) {
  text = text.trim();
  if (!text) return;
  state.todos.push({ id: todoId(), text, done: false });
  saveState();
  renderTodos();
}

document.getElementById('todo-add-ok').onclick = () => {
  const input = document.getElementById('todo-input');
  addTodo(input.value);
  input.value = '';
  input.focus();
};
document.getElementById('todo-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const input = document.getElementById('todo-input');
    addTodo(input.value);
    input.value = '';
  }
});
document.getElementById('todo-clear-done').onclick = () => {
  state.todos = state.todos.filter(t => !t.done);
  saveState(); renderTodos();
};

const todoPanel = document.getElementById('todo-panel');
document.getElementById('todo-toggle-btn').onclick = () => {
  todoPanel.classList.toggle('open');
  if (todoPanel.classList.contains('open')) {
    setTimeout(() => document.getElementById('todo-input').focus(), 230);
  }
};
document.getElementById('todo-close-btn').onclick = () => {
  todoPanel.classList.remove('open');
};

// ── Schedule View ─────────────────────────────────────────────────────────────
const SV_SECTIONS = [
  { key: 'today',      label: 'Today',      color: '#4a9eff', bg: 'rgba(74,158,255,0.08)',   border: 'rgba(74,158,255,0.25)' },
  { key: 'tomorrow',   label: 'Tomorrow',   color: '#f0a030', bg: 'rgba(240,160,48,0.08)',   border: 'rgba(240,160,48,0.25)' },
  { key: 'week',       label: 'This Week',  color: '#a78bfa', bg: 'rgba(167,139,250,0.08)',  border: 'rgba(167,139,250,0.25)' },
  { key: 'non-urgent', label: 'Non-urgent', color: '#888780', bg: 'rgba(136,135,128,0.06)',  border: 'rgba(136,135,128,0.2)' },
  { key: 'urgent',     label: 'Urgent',     color: '#e85050', bg: 'rgba(232,80,80,0.08)',    border: 'rgba(232,80,80,0.25)' },
];

function collectFlaggedTasks() {
  const byFlag = { today: [], tomorrow: [], week: [], 'non-urgent': [], urgent: [] };
  function walk(node, projTitle, projCol) {
    if (node.flag && !node.done && byFlag[node.flag] !== undefined) {
      byFlag[node.flag].push({ node, projTitle, projCol });
    }
    (node.children || []).forEach(c => walk(c, projTitle, projCol));
  }
  state.projects.forEach((proj, pi) => {
    walk(proj, proj.title, PALETTE[pi % PALETTE.length]);
  });
  return byFlag;
}

function renderScheduleView() {
  const byFlag = collectFlaggedTasks();
  const total = SV_SECTIONS.reduce((s, sec) => s + byFlag[sec.key].length, 0);

  const container = document.getElementById('schedule-view');
  container.innerHTML = `
    <div class="sv-header">
      <span class="sv-title">Schedule</span>
      <span class="sv-meta">${total === 0 ? 'No flagged tasks' : `${total} flagged task${total !== 1 ? 's' : ''} across all projects`}</span>
    </div>
    <div class="sv-columns">
      ${SV_SECTIONS.map(sec => {
        const tasks = byFlag[sec.key];
        return `
          <div class="sv-col">
            <div class="sv-col-header" style="background:${sec.bg}; border-bottom-color:${sec.border}">
              <span class="sv-col-label" style="color:${sec.color}">${sec.label}</span>
              <span class="sv-col-count" style="background:${sec.border}; color:${sec.color}">${tasks.length}</span>
            </div>
            <div class="sv-col-body" data-flag="${sec.key}">
              ${tasks.length === 0
                ? '<div class="sv-empty">Nothing here</div>'
                : tasks.map(({ node, projTitle, projCol }) => `
                  <div class="sv-task" style="--accent:${projCol.bar}" data-id="${node.id}" draggable="true" title="View on map">
                    <div class="sv-task-title">${esc(node.title)}</div>
                    ${node.subtitle ? `<div class="sv-task-sub">${esc(node.subtitle)}</div>` : ''}
                    <div class="sv-task-footer">
                      <span class="sv-proj-name" style="color:${projCol.bar}">${esc(projTitle)}</span>
                      <span class="sv-task-nav">↗ map</span>
                      <button class="sv-btn done-btn" data-id="${node.id}" title="Mark done">✓</button>
                      <button class="sv-btn clear-btn" data-id="${node.id}" title="Clear flag">⚑</button>
                    </div>
                  </div>
                `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  container.querySelectorAll('.sv-btn.done-btn').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const node = findNodeById(btn.dataset.id);
      if (node) { node.done = true; node.completedAt = Date.now(); saveState(); render(); renderScheduleView(); }
    };
  });
  container.querySelectorAll('.sv-btn.clear-btn').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const node = findNodeById(btn.dataset.id);
      if (node) { node.flag = null; saveState(); render(); renderScheduleView(); }
    };
  });
  container.querySelectorAll('.sv-task').forEach(card => {
    card.onclick = e => {
      if (e.target.closest('.sv-btn')) return;
      navigateToNode(card.dataset.id);
    };
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      requestAnimationFrame(() => card.classList.add('sv-dragging'));
    });
    card.addEventListener('dragend', () => card.classList.remove('sv-dragging'));
  });

  container.querySelectorAll('.sv-col-body').forEach(body => {
    body.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      body.classList.add('sv-drag-over');
    });
    body.addEventListener('dragleave', e => {
      if (!body.contains(e.relatedTarget)) body.classList.remove('sv-drag-over');
    });
    body.addEventListener('drop', e => {
      e.preventDefault();
      body.classList.remove('sv-drag-over');
      const node = findNodeById(e.dataTransfer.getData('text/plain'));
      if (node && node.flag !== body.dataset.flag) {
        node.flag = body.dataset.flag;
        saveState();
        render();
        renderScheduleView();
      }
    });
  });
}

// ── Momentum View ─────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const MIN = 60000, HOUR = 3600000, DAY = 86400000;
  if (diff < MIN)        return 'just now';
  if (diff < HOUR)       return `${Math.floor(diff / MIN)}m ago`;
  if (diff < DAY)        return `${Math.floor(diff / HOUR)}h ago`;
  if (diff < 2 * DAY)    return 'yesterday';
  return `${Math.floor(diff / DAY)}d ago`;
}

function renderMomentumView() {
  const now = Date.now();
  const DAY = 86400000;
  const cutoff7 = now - 7 * DAY;
  const HEAT_WEEKS = 5;
  const HEAT_TOTAL = HEAT_WEEKS * 7; // 35 cells

  // Collect completed tasks (last 7 days for list, up to 35 days for heatmap)
  const recent = [];
  const heatCounts = Array(HEAT_TOTAL).fill(0);

  function walk(node, projTitle, projCol) {
    if (node.done && node.completedAt) {
      if (node.completedAt > cutoff7) recent.push({ node, projTitle, projCol });
      const daysAgo = Math.floor((now - node.completedAt) / DAY);
      const bucket = HEAT_TOTAL - 1 - daysAgo;
      if (bucket >= 0 && bucket < HEAT_TOTAL) heatCounts[bucket]++;
    }
    (node.children || []).forEach(c => walk(c, projTitle, projCol));
  }
  state.projects.forEach((proj, pi) => walk(proj, proj.title, PALETTE[pi % PALETTE.length]));
  recent.sort((a, b) => b.node.completedAt - a.node.completedAt);

  // ── 7-day sparkline ──────────────────────────────────────────────────────
  const bars = Array(7).fill(0);
  recent.forEach(({ node }) => {
    const bucket = 6 - Math.floor((now - node.completedAt) / DAY);
    if (bucket >= 0 && bucket < 7) bars[bucket]++;
  });
  const maxBar = Math.max(1, ...bars);

  const dayLabels = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(now - (6 - i) * DAY);
    return i === 6 ? 'Today' : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  });

  const bestCount = Math.max(...bars);
  const bestLabel = bestCount > 0 ? `${bestCount} task${bestCount !== 1 ? 's' : ''} on ${dayLabels[bars.indexOf(bestCount)]}` : '—';

  let streak = 0;
  for (let i = 6; i >= 0; i--) {
    if (bars[i] > 0) streak++;
    else break;
  }

  const projMap = new Map();
  recent.forEach(t => {
    if (!projMap.has(t.projTitle)) projMap.set(t.projTitle, { col: t.projCol, tasks: [] });
    projMap.get(t.projTitle).tasks.push(t);
  });

  const barW = 24, barGap = 8, totalW = 7 * (barW + barGap) - barGap, svgH = 88;
  const sparkSVG = `<svg class="mv-spark-svg" viewBox="0 0 ${totalW} ${svgH}" preserveAspectRatio="none">
    ${bars.map((v, i) => {
      const bh = Math.max(3, Math.round((v / maxBar) * (svgH - 14)));
      const x = i * (barW + barGap);
      const y = svgH - bh;
      const isToday = i === 6;
      const fill = isToday ? '#5dcaa5' : (v > 0 ? '#3d3d3b' : '#2a2a28');
      return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${fill}"/>
        ${v > 0 ? `<text x="${x + barW / 2}" y="${y - 4}" text-anchor="middle" fill="${isToday ? '#5dcaa5' : '#5f5e5a'}" font-size="9" font-family="sans-serif">${v}</text>` : ''}`;
    }).join('')}
  </svg>`;

  // ── 35-day heatmap (5 weeks × 7 days, Sun–Sat rows, oldest col left) ────
  const todayDow = new Date(now).getDay(); // 0=Sun … 6=Sat
  const maxHeat = Math.max(1, ...heatCounts);
  const CELL = 22, CGAP = 4, LBFW = 14, LBFGAP = 4;
  const hSvgW = LBFW + LBFGAP + HEAT_WEEKS * (CELL + CGAP) - CGAP;
  const hSvgH = 7 * (CELL + CGAP) - CGAP;
  const DAY_LBL = ['S','M','T','W','T','F','S'];
  const SHOW_LBL = [false, true, false, true, false, true, false]; // M W F

  function heatFill(count) {
    if (count === 0) return '#252523';
    const t = count / maxHeat;
    if (t < 0.25) return '#173d2e';
    if (t < 0.5)  return '#1d5540';
    if (t < 0.75) return '#267055';
    return '#5dcaa5';
  }

  let hCells = '';
  for (let r = 0; r < 7; r++) {
    if (SHOW_LBL[r]) {
      const y = r * (CELL + CGAP) + CELL / 2 + 4;
      hCells += `<text x="${LBFW}" y="${y}" text-anchor="end" fill="#3a3a36" font-size="8" font-family="sans-serif">${DAY_LBL[r]}</text>`;
    }
  }
  for (let c = 0; c < HEAT_WEEKS; c++) {
    for (let r = 0; r < 7; r++) {
      const i = c * 7 + r;
      const daysAgo = (HEAT_WEEKS - 1) * 7 + todayDow - i;
      const x = LBFW + LBFGAP + c * (CELL + CGAP);
      const y = r * (CELL + CGAP);
      if (daysAgo < 0) {
        // future cell — dim placeholder
        hCells += `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="3" fill="#1e1e1c"/>`;
      } else {
        const hIdx = HEAT_TOTAL - 1 - daysAgo;
        const count = (hIdx >= 0 && hIdx < HEAT_TOTAL) ? heatCounts[hIdx] : 0;
        const fill = heatFill(count);
        const isToday = daysAgo === 0;
        hCells += isToday
          ? `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="3" fill="${fill}" stroke="#5dcaa5" stroke-width="1.5"/>`
          : `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="3" fill="${fill}"/>`;
      }
    }
  }
  const heatmapSVG = `<svg viewBox="0 0 ${hSvgW} ${hSvgH}" width="${hSvgW}" height="${hSvgH}" style="display:block">${hCells}</svg>`;

  // ── Task list ─────────────────────────────────────────────────────────────
  let listHTML = '';
  if (recent.length === 0) {
    listHTML = `
      <div class="mv-skeleton-group">
        <div class="mv-skeleton-heading"></div>
        <div class="mv-skeleton-row"></div>
        <div class="mv-skeleton-row" style="opacity:0.55"></div>
      </div>
      <div class="mv-skeleton-group">
        <div class="mv-skeleton-heading" style="width:38%"></div>
        <div class="mv-skeleton-row"></div>
        <div class="mv-skeleton-row" style="opacity:0.55"></div>
        <div class="mv-skeleton-row" style="opacity:0.28"></div>
      </div>
      <div class="mv-empty-hint">Complete tasks to see your<br>activity grouped by project</div>
    `;
  } else {
    projMap.forEach(({ col, tasks }, projTitle) => {
      listHTML += `
        <div class="mv-proj-group">
          <div class="mv-proj-heading" style="border-left-color:${col.bar}; color:${col.bar}">
            <span class="mv-proj-heading-name">${esc(projTitle)}</span>
            <span class="mv-proj-heading-count">${tasks.length} completed</span>
          </div>
          <div>
            ${tasks.map(({ node, projCol: c }) => `
              <div class="mv-task">
                <div class="mv-check-ring" style="border-color:${c.bar}; color:${c.bar}">✓</div>
                <div class="mv-task-info">
                  <div class="mv-task-name">${esc(node.title)}</div>
                  ${node.subtitle ? `<div class="mv-task-sub">${esc(node.subtitle)}</div>` : ''}
                </div>
                <div class="mv-task-age">${timeAgo(node.completedAt)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });
  }

  const container = document.getElementById('momentum-view');
  container.innerHTML = `
    <div class="mv-header">
      <span class="mv-title">Momentum</span>
      <span class="mv-meta">Last 7 days &mdash; <strong style="color:#5dcaa5">${recent.length}</strong> task${recent.length !== 1 ? 's' : ''} completed</span>
    </div>
    <div class="mv-body">
      <div class="mv-sidebar">
        <div class="mv-spark-label">Daily activity</div>
        ${sparkSVG}
        <div class="mv-spark-days">
          ${dayLabels.map((l, i) => `<span${i === 6 ? ' class="is-today"' : ''}>${l}</span>`).join('')}
        </div>
        <div class="mv-heatmap-section">
          <div class="mv-spark-label">5-week activity</div>
          ${heatmapSVG}
        </div>
        <div class="mv-stats">
          <div class="mv-stat"><span>This week</span><span class="mv-stat-val">${recent.length} done</span></div>
          <div class="mv-stat"><span>Best day</span><span class="mv-stat-val">${bestLabel}</span></div>
          <div class="mv-stat"><span>Streak</span><span class="mv-stat-val">${streak > 0 ? `${streak} day${streak !== 1 ? 's' : ''}` : 'None yet'}</span></div>
          <div class="mv-stat"><span>Projects active</span><span class="mv-stat-val">${projMap.size}</span></div>
        </div>
      </div>
      <div class="mv-list-area">${listHTML}</div>
    </div>
  `;
}

// ── Graph Render ──────────────────────────────────────────────────────────────
function getNodeAtPoint(x, y) {
  for (const [id, pos] of Object.entries(lastPositions)) {
    if (x >= pos.x && x <= pos.x + pos.w && y >= pos.y && y <= pos.y + pos.h) return id;
  }
  return null;
}

function render() {
  const nodesLayer = document.getElementById('nodes-layer');
  const svg = document.getElementById('arrows');
  const empty = document.getElementById('empty-state');
  nodesLayer.innerHTML = '';
  svg.innerHTML = '';
  empty.style.display = state.projects.length ? 'none' : 'flex';

  let allPositions = {}, curY = 0;
  const projData = [];
  state.projects.forEach((proj, pi) => {
    const { positions, totalHeight } = layoutProject(proj, curY);
    Object.assign(allPositions, positions);
    projData.push({ proj, pi, totalHeight });
    curY += totalHeight + PROJ_GAP;
  });

  lastPositions = allPositions;

  const maxX = Math.max(400, ...Object.values(allPositions).map(p => p.x + p.w)) + OFFSET_X;
  const maxY = OFFSET_Y + curY + OFFSET_Y;
  document.getElementById('canvas').style.width  = maxX + 'px';
  document.getElementById('canvas').style.height = maxY + 'px';
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);

  const markerDefs = projData.map(({ pi }) => {
    const col = PALETTE[pi % PALETTE.length];
    return `<marker id="ah${pi}" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="${col.arrow}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>`;
  }).join('');
  svg.innerHTML = `<defs>${markerDefs}
    <marker id="ah-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a3a36" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  function renderNode(node, parentId, proj, pi) {
    const pos = allPositions[node.id];
    if (!pos) return;
    const col = PALETTE[pi % PALETTE.length];

    if (parentId) {
      const ppos = allPositions[parentId];
      const x1 = ppos.x + ppos.w, y1 = ppos.y + ppos.h / 2;
      const x2 = pos.x,           y2 = pos.y + pos.h / 2;
      const mx = x1 + (x2 - x1) / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1} ${y1} C${mx} ${y1} ${mx} ${y2} ${x2} ${y2}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', node.done ? '#3a3a36' : col.arrow);
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('marker-end', node.done ? 'url(#ah-dim)' : `url(#ah${pi})`);
      svg.appendChild(path);
    }

    const el = document.createElement('div');
    el.className = 'node-el' + (!parentId ? ' root' : '') + (node.done ? ' done' : '') + (node.priority && !node.done ? ' priority' : '');
    el.id = 'node-' + node.id;
    el.style.left   = pos.x + 'px';
    el.style.top    = pos.y + 'px';
    el.style.width  = pos.w + 'px';
    const isRoot = !parentId;
    el.style.setProperty('--glow-color', col.glow);
    el.style.setProperty('--bar-color', col.bar);
    if (isRoot) {
      el.style.borderTop    = `3px solid ${col.bar}`;
      el.style.borderRight  = `0.5px solid ${col.border}`;
      el.style.borderBottom = `0.5px solid ${col.border}`;
      el.style.borderLeft   = `6px solid ${col.bar}`;
    } else {
      el.style.border     = `0.5px solid ${col.border}`;
      el.style.borderLeft = `3px solid ${col.bar}`;
    }
    el.style.boxShadow = (node.priority && !node.done) ? '' :
      (node.done ? 'none' :
        (isRoot ? '' : `0 0 0 1px ${col.border}22, 0 4px 24px ${col.glow}`));

    const flagClass = node.flag ? ' flag-' + node.flag : '';
    const upToDate = !node.done && node.children && node.children.length > 0 && allDescendantsDone(node);
    let healthBadgeHtml = '';
    if (isRoot) {
      const health = getProjectHealth(proj);
      const momentum = getProjectMomentum(proj);
      const HEALTH_LABELS = { active: 'Active', drifting: 'Drifting', stalled: 'Stalled', complete: 'Complete' };
      const suffix = (health === 'active' && momentum > 0) ? ` · ${momentum} this week` : '';
      healthBadgeHtml = `<div class="node-health health-${health}">● ${HEALTH_LABELS[health]}${suffix}</div>`;
    }
    el.innerHTML = `
      <div class="node-controls">
        <div class="ctrl-btn done-btn${node.done ? ' active' : ''}" title="Done">✓</div>
        <div class="ctrl-btn priority-btn${node.priority ? ' active' : ''}" title="Priority">★</div>
        <div class="ctrl-btn flag-btn${flagClass}" title="Flag">⚑</div>
        <div class="ctrl-btn del-btn" title="Delete">✕</div>
      </div>
      <div class="node-title">${esc(node.title)}</div>
      <div class="node-subtitle">${esc(node.subtitle || '')}</div>
      <div class="node-note">${esc(node.note || '')}</div>
      ${node.flag && !node.done ? `<div class="node-flag flag-${node.flag}">${FLAG_LABELS[node.flag]}</div>` : ''}
      ${upToDate ? '<div class="node-uptodate">✓ up to date</div>' : ''}
      ${healthBadgeHtml}
    `;

    el.querySelector('.done-btn').onclick = e => {
      e.stopPropagation();
      node.done = !node.done;
      node.completedAt = node.done ? Date.now() : null;
      saveState();
      render();
    };
    el.querySelector('.priority-btn').onclick = e => { e.stopPropagation(); node.priority = !node.priority; saveState(); render(); };
    el.querySelector('.flag-btn').onclick = e => { e.stopPropagation(); node.flag = node.flag ? FLAG_CYCLE[node.flag] : 'today'; saveState(); render(); };
    el.querySelector('.del-btn').onclick = e => {
      e.stopPropagation();
      if (activeEdit && activeEdit.node === node) activeEdit = null;
      if (!parentId) state.projects.splice(pi, 1);
      else removeNode(proj, node.id);
      saveState(); render();
    };
    el.ondblclick = e => { e.stopPropagation(); startEdit(el, node); };

    el.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (e.target.closest('.node-controls')) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      e.stopPropagation();
      const info = findParentInfo(node.id);
      if (!info || info.arr.length < 2) return;
      dragSt = {
        nodeId: node.id, startX: e.clientX, startY: e.clientY,
        active: false, dropIndex: null, ghost: null, indicator: null, srcEl: null,
      };
    });

    nodesLayer.appendChild(el);

    const btn = document.createElement('div');
    btn.className = 'add-child-btn';
    btn.style.left     = (pos.x + pos.w + 10) + 'px';
    btn.style.top      = (pos.y + pos.h / 2 - 9) + 'px';
    btn.style.position = 'absolute';
    btn.innerHTML = '+';
    btn.style.borderColor = col.border;
    btn.onmousedown = e => e.stopPropagation();
    btn.onclick = e => {
      e.stopPropagation();
      if (activeEdit) commitEdit();
      const child = newNode('Update');
      node.children.push(child);
      saveState(); render();
      setTimeout(() => { const ne = document.getElementById('node-' + child.id); if (ne) startEdit(ne, child); }, 30);
    };
    el.addEventListener('mouseenter', () => btn.style.opacity = '1');
    el.addEventListener('mouseleave', () => { if (!btn.matches(':hover')) btn.style.opacity = '0'; });
    btn.addEventListener('mouseleave', () => btn.style.opacity = '0');
    nodesLayer.appendChild(btn);

    (node.children || []).forEach(child => renderNode(child, node.id, proj, pi));
  }

  projData.forEach(({ proj, pi }) => renderNode(proj, null, proj, pi));

  renderTodos();
  renderMinimap();
}

function esc(s)  { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function escA(s) { return String(s || '').replace(/"/g, '&quot;'); }

document.getElementById('add-btn').onclick = () => {
  if (activeEdit) commitEdit();
  const p = newNode('New project');
  state.projects.push(p);
  saveState(); render();
  setTimeout(() => { const e = document.getElementById('node-' + p.id); if (e) startEdit(e, p); }, 30);
};

// ── Export / Import ───────────────────────────────────────────────────────────
function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportState() {
  const date = new Date().toISOString().slice(0, 10);
  downloadJSON({ version: STORAGE_KEY, exportedAt: new Date().toISOString(), projects: state.projects, todos: state.todos }, `projects-backup-${date}.json`);
}

document.getElementById('export-btn').onclick = exportState;

document.getElementById('import-btn').onclick = () => {
  document.getElementById('import-file').value = '';
  document.getElementById('import-file').click();
};

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  if (state.projects.length || state.todos.length) {
    const date = new Date().toISOString().slice(0, 10);
    downloadJSON({ version: STORAGE_KEY, exportedAt: new Date().toISOString(), projects: state.projects, todos: state.todos }, `projects-backup-${date}.json`);
  }

  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const loaded = JSON.parse(ev.target.result);
      if (!Array.isArray(loaded.projects)) throw new Error();
      state.projects = loaded.projects;
      state.todos = Array.isArray(loaded.todos) ? loaded.todos : [];
      let mx = 0;
      function walk(n) {
        mx = Math.max(mx, parseInt(n.id.slice(1)) || 0);
        if (!('completedAt' in n)) n.completedAt = null;
        if (!('createdAt' in n)) n.createdAt = null;
        (n.children || []).forEach(walk);
      }
      state.projects.forEach(walk);
      idC = mx + 1;
      saveState();
      render();
    } catch (_) {
      alert('Could not read this file. Make sure it\'s a valid Projects backup.');
    }
  };
  reader.readAsText(file);
});

window.addEventListener('resize', render);

// ── Guide ─────────────────────────────────────────────────────────────────────
const GUIDE_KEY = 'pgraph_guided';
const GUIDE_STEPS = [
  {
    icon: '◻',
    title: 'Welcome to Project Graph Manager',
    body: 'A visual tool for managing projects and tracking momentum. This quick guide covers the key features &mdash; takes about 30 seconds.',
  },

  },
  {
    icon: '⚑',
    title: 'Flagging tasks',
    body: 'Hover any card and click <strong>⚑</strong> to set a flag: <em>Today</em>, <em>Tomorrow</em>, <em>This week</em>, or <em>Urgent</em>. Flagged tasks surface automatically in the Schedule view.',
  },

  },
  {

    body: 'Switch to <strong>◎ Momentum</strong> to see each project\'s health &mdash; <em>active</em>, <em>stale</em>, or <em>stuck</em> &mdash; based on how recently tasks were completed.',
  },
  {

    title: 'Essentials panel',
    body: 'Click <strong>◈ Essentials</strong> in the toolbar for a quick to-do list not tied to any project. Use it for small tasks that don\'t need a full project card. You\'re all set &mdash; happy planning!',
  },
];

let guideStep = 0;

function renderGuideStep() {
  const step = GUIDE_STEPS[guideStep];
  document.getElementById('guide-icon').textContent = step.icon;
  document.getElementById('guide-title').textContent = step.title;
  document.getElementById('guide-body').innerHTML = step.body;
  document.getElementById('guide-dots').innerHTML = GUIDE_STEPS.map((_, i) =>
    `<div class="guide-dot${i === guideStep ? ' active' : ''}"></div>`
  ).join('');
  document.getElementById('guide-prev').style.visibility = guideStep === 0 ? 'hidden' : 'visible';
  document.getElementById('guide-next').textContent = guideStep === GUIDE_STEPS.length - 1 ? 'Done ✓' : 'Next →';
}

function showGuide(step = 0) {
  guideStep = step;
  renderGuideStep();
  document.getElementById('guide-overlay').classList.remove('hidden');
}

function hideGuide() {
  document.getElementById('guide-overlay').classList.add('hidden');
  try { localStorage.setItem(GUIDE_KEY, '1'); } catch(e) {}
}

document.getElementById('guide-next').onclick = () => {
  if (guideStep < GUIDE_STEPS.length - 1) { guideStep++; renderGuideStep(); }
  else hideGuide();
};
document.getElementById('guide-prev').onclick = () => {
  if (guideStep > 0) { guideStep--; renderGuideStep(); }
};
document.getElementById('guide-skip').onclick = hideGuide;
document.getElementById('guide-overlay').onclick = e => {
  if (e.target === document.getElementById('guide-overlay')) hideGuide();
};
document.getElementById('guide-btn').onclick = () => showGuide(0);

loadState();
render();
if (!localStorage.getItem(GUIDE_KEY)) showGuide();
</script>
